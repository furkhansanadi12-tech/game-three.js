<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Snake & Ladder</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #111;
    }

    #ui {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
      color: white;
    }

    button {
      padding: 10px 20px;
      border: none;
      background: orange;
      color: black;
      font-size: 18px;
      cursor: pointer;
      border-radius: 10px;
    }

    h2, p {
      margin: 10px 0;
    }
  </style>
</head>
<body>

<div id="ui">
  <h2>Snake & Ladder</h2>
  <button onclick="rollDice()">Roll Dice</button>
  <p id="dice">Dice: 0</p>
  <p id="position">Position: 1</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
  // Scene
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x222222);

  // Camera
  const camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );

  camera.position.set(0, 15, 18);
  camera.lookAt(0, 0, 0);

  // Renderer
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // Light
  const light = new THREE.DirectionalLight(0xffffff, 2);
  light.position.set(10, 20, 10);
  scene.add(light);

  // Board
  const tiles = [];
  const tileSize = 1.5;

  for (let row = 0; row < 10; row++) {
    for (let col = 0; col < 10; col++) {

      const geometry = new THREE.BoxGeometry(tileSize, 0.2, tileSize);

      const material = new THREE.MeshPhongMaterial({
        color: (row + col) % 2 === 0 ? 0x4caf50 : 0xffffff
      });

      const tile = new THREE.Mesh(geometry, material);

      tile.position.x = (col - 4.5) * tileSize;
      tile.position.z = (row - 4.5) * tileSize;

      scene.add(tile);
      tiles.push(tile);
    }
  }

  // Player
  const playerGeometry = new THREE.SphereGeometry(0.5, 32, 32);

  const playerMaterial = new THREE.MeshPhongMaterial({
    color: 0xff0000
  });

  const player = new THREE.Mesh(playerGeometry, playerMaterial);

  player.position.y = 0.7;

  scene.add(player);

  // Snakes and Ladders
  const snakes = {
    17: 7,
    54: 34,
    62: 19,
    98: 79
  };

  const ladders = {
    3: 22,
    8: 26,
    20: 38,
    50: 67
  };

  // Position
  let currentPosition = 1;

  function getTilePosition(number) {

    const index = number - 1;

    const row = Math.floor(index / 10);
    let col = index % 10;

    // Zig-zag pattern
    if (row % 2 === 1) {
      col = 9 - col;
    }

    return {
      x: (col - 4.5) * tileSize,
      z: (row - 4.5) * tileSize
    };
  }

  function updatePlayer() {
    const pos = getTilePosition(currentPosition);

    player.position.x = pos.x;
    player.position.z = pos.z;

    document.getElementById("position").innerText =
      "Position: " + currentPosition;
  }

  updatePlayer();

  // Dice Roll
  function rollDice() {

    let dice = Math.floor(Math.random() * 6) + 1;

    document.getElementById("dice").innerText =
      "Dice: " + dice;

    currentPosition += dice;

    if (currentPosition > 100) {
      currentPosition = 100;
    }

    // Snake
    if (snakes[currentPosition]) {
      alert("Snake Bite!");
      currentPosition = snakes[currentPosition];
    }

    // Ladder
    if (ladders[currentPosition]) {
      alert("You climbed a ladder!");
      currentPosition = ladders[currentPosition];
    }

    updatePlayer();

    if (currentPosition === 100) {
      alert("You Win!");
    }
  }

  // Animation
  function animate() {
    requestAnimationFrame(animate);

    player.rotation.y += 0.02;

    renderer.render(scene, camera);
  }

  animate();

  // Resize
  window.addEventListener("resize", () => {

    camera.aspect = window.innerWidth / window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(window.innerWidth, window.innerHeight);

  });
</script>

</body>
</html>
